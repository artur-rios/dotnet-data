name: Publish Package

# Publishes a single NuGet package from this multi-package repository.
#
# Trigger: push a per-package tag of the form  <PackageId>@<version>
#   e.g.  ArturRios.Data.Export@1.0.0
#         ArturRios.Data.Relational.Core@2.0.0
# The tag names which package to publish and at which version; the version
# must match that project's <Version>. Packages are versioned independently,
# so tag each release separately (dependencies first, e.g. Relational.Core
# before Sqlite, or Export before Export.Excel).
#
# Manual runs: use "Run workflow" and supply the package id and version.

permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - '*@*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package id to publish (e.g. ArturRios.Data.Export)'
        required: true
      version:
        description: 'Version to publish (must match the project <Version>)'
        required: true

jobs:
  package-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ref
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve package and version
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PACKAGE="$INPUT_PACKAGE"
            VERSION="$INPUT_VERSION"
          else
            # REF_NAME is the tag short name, e.g. ArturRios.Data.Export@1.0.0
            TAG="$REF_NAME"
            if [[ "$TAG" != *"@"* ]]; then
              echo "Tag '$TAG' is not in the expected <PackageId>@<version> form." >&2
              exit 1
            fi
            PACKAGE="${TAG%@*}"
            VERSION="${TAG#*@}"
          fi
          if [ -z "$PACKAGE" ] || [ -z "$VERSION" ]; then
            echo "Could not resolve a package ('$PACKAGE') and version ('$VERSION')." >&2
            exit 1
          fi
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $PACKAGE $VERSION"

      - name: Locate project
        id: proj
        env:
          PACKAGE: ${{ steps.resolve.outputs.package }}
        run: |
          set -euo pipefail
          # ArturRios.Data.MySql is deferred: it depends on Pomelo.EntityFrameworkCore.MySql,
          # which has no EF Core 10 release, so it is excluded from the build and cannot be packed.
          if [ "$PACKAGE" = "ArturRios.Data.MySql" ]; then
            echo "ArturRios.Data.MySql is deferred (no EF Core 10 MySQL provider yet) and cannot be published." >&2
            exit 1
          fi
          CSPROJ="src/${PACKAGE}/${PACKAGE}.csproj"
          if [ ! -f "$CSPROJ" ]; then
            echo "No project found for package '$PACKAGE' (expected $CSPROJ)." >&2
            exit 1
          fi
          echo "csproj=$CSPROJ" >> "$GITHUB_OUTPUT"

      - name: Validate version matches project
        env:
          CSPROJ: ${{ steps.proj.outputs.csproj }}
          WANT: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          CS_VERSION=$(grep -oP '<Version>\K[^<]+' "$CSPROJ" | head -1)
          echo "Project <Version>: ${CS_VERSION:-<none>}  requested: $WANT"
          if [ -z "${CS_VERSION:-}" ]; then
            echo "No <Version> element found in $CSPROJ." >&2
            exit 1
          fi
          if [ "$CS_VERSION" != "$WANT" ]; then
            echo "Version mismatch: $CSPROJ has <Version>$CS_VERSION</Version> but the tag/input requests $WANT." >&2
            echo "Bump the project <Version> to match the tag (or tag the correct version) and retry." >&2
            exit 1
          fi

      - name: Restore
        env:
          CSPROJ: ${{ steps.proj.outputs.csproj }}
        run: dotnet restore "$CSPROJ"

      - name: Pack
        env:
          CSPROJ: ${{ steps.proj.outputs.csproj }}
        run: |
          dotnet pack "$CSPROJ" \
            --configuration Release \
            --no-restore \
            -o packages

      - name: Publish to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push packages/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # GitHub Packages NuGet feed requires the owner in the URL
          dotnet nuget push packages/*.nupkg \
            --api-key "$GITHUB_TOKEN" \
            --source "https://nuget.pkg.github.com/${OWNER}/index.json" \
            --skip-duplicate
